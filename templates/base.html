<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Мониторинг рынка ОЗУ{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'products:product_list' %}">Мониторинг ОЗУ</a>
            <div class="navbar-nav">
                <a class="nav-link {% if request.resolver_match.app_name == 'products' and request.resolver_match.url_name != 'trigger_scrape' %}active{% endif %}" href="{% url 'products:product_list' %}">Товары</a>
                <a class="nav-link {% if request.resolver_match.app_name == 'analytics' %}active{% endif %}" href="{% url 'analytics:dashboard' %}">Аналитика</a>
                <form method="post" action="{% url 'products:trigger_scrape' %}" class="d-flex">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-outline-light btn-sm ms-3">Обновить данные</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
